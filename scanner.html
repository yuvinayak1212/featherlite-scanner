<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Scan Material QR - Featherlite</title>
<style>
  :root {
    --primary: #0b5d3b;
    --primary-dark: #08442b;
    --error: #ffb4b4;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; background: #000;
    font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #fff;
    overflow: hidden;
  }
  .bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    padding: 14px 16px; display: flex; align-items: center; justify-content: space-between;
    background: rgba(0,0,0,0.55);
  }
  .bar span { font-size: 15px; font-weight: 600; }
  .bar button {
    background: rgba(255,255,255,0.18); color: #fff; border: none; border-radius: 6px;
    padding: 8px 14px; font-size: 13px; cursor: pointer;
  }
  .video-wrap { position: fixed; inset: 0; }
  video { width: 100%; height: 100%; object-fit: cover; }
  .frame {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 72%; max-width: 300px; aspect-ratio: 1; border: 3px solid #fff;
    border-radius: 14px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.45);
    pointer-events: none;
  }
  .hint {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
    text-align: center; padding: 16px 20px 28px; font-size: 13px;
    background: rgba(0,0,0,0.55);
  }
  .hint.error { color: var(--error); }
  .center-message {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 30px; font-size: 15px; line-height: 1.6;
  }
  .center-message a {
    color: #9fe3b8; text-decoration: underline;
  }
  .spinner {
    width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.25); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .retry-btn {
    margin-top: 16px; background: var(--primary); color: #fff; border: none; border-radius: 8px;
    padding: 12px 22px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .retry-btn:hover { background: var(--primary-dark); }
</style>
</head>
<body>

<div class="bar">
  <span>Scan Material QR</span>
  <button id="cancelBtn">Cancel</button>
</div>

<div class="video-wrap" id="videoWrap" style="display:none;">
  <video id="video" autoplay playsinline muted></video>
  <div class="frame"></div>
</div>

<div class="hint" id="hint" style="display:none;">Point the camera at the QR code on the material</div>

<div class="center-message" id="centerMessage">
  <div>
    <div class="spinner"></div>
    Starting camera…
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<script>
  // ====== CONFIG ======
  // The Apps Script web app URL to redirect back to once a QR is scanned.
  // Update this if you redeploy and the URL changes.
  var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwjxX47FTFCc6RFbsAEGmUpaUtmEaZr09Ab6R_cRy7lgiaQ3HOq8i6RX8H84geB7ZEI/exec';

  // Carry through whatever Workstation/Department/Shift/Operator the form
  // had selected before sending the operator here, so they aren't lost
  // when we redirect back.
  var incomingParams = new URLSearchParams(window.location.search);

  function carryThroughParamsString() {
    var p = new URLSearchParams();
    ['ws', 'dept', 'shift', 'op'].forEach(function (key) {
      var v = incomingParams.get(key);
      if (v) p.set(key, v);
    });
    return p.toString();
  }

  var stream = null;
  var rafId = null;
  var canvas = document.createElement('canvas');
  var ctx = canvas.getContext('2d');
  var nativeDetector = null;
  var stopped = false;

  function el(id) { return document.getElementById(id); }

  function showCenterMessage(html) {
    el('videoWrap').style.display = 'none';
    el('hint').style.display = 'none';
    var msg = el('centerMessage');
    msg.style.display = 'flex';
    msg.innerHTML = html;
  }

  function startCamera() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showCenterMessage('Camera access is not supported in this browser.<br><br>' +
        '<button class="retry-btn" onclick="goBackManual()">Enter Manually Instead</button>');
      return;
    }

    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
      .then(function (s) {
        stream = s;
        var video = el('video');
        video.srcObject = s;
        video.play();

        el('centerMessage').style.display = 'none';
        el('videoWrap').style.display = 'block';
        el('hint').style.display = 'block';
        el('hint').className = 'hint';
        el('hint').textContent = 'Point the camera at the QR code on the material';

        if ('BarcodeDetector' in window) {
          try { nativeDetector = new BarcodeDetector(); } catch (e) { nativeDetector = null; }
        }
        scanLoop();
      })
      .catch(function (err) {
        showCenterMessage(
          'Could not access camera:<br>' + (err && err.message ? err.message : err) +
          '<br><br><button class="retry-btn" onclick="startCamera()">Try Again</button>' +
          '<br><button class="retry-btn" style="margin-top:10px;background:#444;" onclick="goBackManual()">Enter Manually Instead</button>'
        );
      });
  }

  function scanLoop() {
    if (stopped) return;
    var video = el('video');
    if (!video || video.readyState !== video.HAVE_ENOUGH_DATA) {
      rafId = requestAnimationFrame(scanLoop);
      return;
    }

    if (nativeDetector) {
      nativeDetector.detect(video).then(function (codes) {
        if (codes && codes.length > 0) {
          onScanSuccess(codes[0].rawValue);
        } else {
          rafId = requestAnimationFrame(scanLoop);
        }
      }).catch(function () {
        rafId = requestAnimationFrame(scanLoop);
      });
      return;
    }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var code = (typeof jsQR !== 'undefined') ? jsQR(imageData.data, imageData.width, imageData.height) : null;

    if (code && code.data) {
      onScanSuccess(code.data);
    } else {
      rafId = requestAnimationFrame(scanLoop);
    }
  }

  function stopCamera() {
    stopped = true;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    if (stream) {
      stream.getTracks().forEach(function (t) { t.stop(); });
      stream = null;
    }
  }

  function onScanSuccess(rawValue) {
    stopCamera();
    showCenterMessage('<div class="spinner"></div>Scanned! Returning to form…');
    redirectBackWithData(rawValue);
  }

  function redirectBackWithData(rawValue) {
    // rawValue format produced by the Generator: pieceId|component|product|quantity|size|shade
    var carry = carryThroughParamsString();
    var url = APPS_SCRIPT_URL + '?scanned=' + encodeURIComponent(rawValue) + (carry ? '&' + carry : '');
    window.location.href = url;
  }

  function goBackManual() {
    stopCamera();
    var carry = carryThroughParamsString();
    window.location.href = APPS_SCRIPT_URL + '?scanFailed=1' + (carry ? '&' + carry : '');
  }

  el('cancelBtn').addEventListener('click', function () {
    stopCamera();
    // Go back to the form without any scanned data, but still carry
    // through whatever was already selected.
    var carry = carryThroughParamsString();
    window.location.href = APPS_SCRIPT_URL + (carry ? '?' + carry : '');
  });

  window.addEventListener('beforeunload', stopCamera);

  startCamera();
</script>
</body>
</html>
